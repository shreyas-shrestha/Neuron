services:
  # Redis for Celery (ML analysis workers). Run only this service:
  #   docker compose up -d redis
  # Then set CELERY_BROKER_URL=redis://127.0.0.1:6379/0 in backend/.env
  redis:
    image: redis:7-alpine
    container_name: neuron-redis
    ports:
      - "6379:6379"
    volumes:
      - neuron-redis:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - neuron-db:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/neuron.db
      - SECRET_KEY=${NEURON_SECRET_KEY:?NEURON_SECRET_KEY must be set (e.g. in repo-root .env)}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neuron-db:
  neuron-redis:
