services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - neuron-db:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/neuron.db
      - SECRET_KEY=${NEURON_SECRET_KEY:?NEURON_SECRET_KEY must be set (e.g. in repo-root .env)}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neuron-db:
