services:
  postgres:
    image: postgres:16-alpine
    container_name: neuron-postgres
    environment:
      - POSTGRES_DB=neuron
      - POSTGRES_USER=neuron
      - POSTGRES_PASSWORD=neuron
    ports:
      - "5432:5432"
    volumes:
      - neuron-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuron -d neuron"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for Celery (ML analysis workers). Run only this service:
  #   docker compose up -d redis
  # Then set CELERY_BROKER_URL=redis://127.0.0.1:6379/0 in backend/.env
  redis:
    image: redis:7-alpine
    container_name: neuron-redis
    ports:
      - "6379:6379"
    volumes:
      - neuron-redis:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://neuron:neuron@postgres:5432/neuron
      - SECRET_KEY=${NEURON_SECRET_KEY:?NEURON_SECRET_KEY must be set (e.g. in repo-root .env)}
      - DEMO_MODE_ENABLED=${DEMO_MODE_ENABLED:-true}
      - BOOTSTRAP_DEMO_USER=${BOOTSTRAP_DEMO_USER:-true}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neuron-postgres:
  neuron-redis:
